name = "bt-servant-telegram-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"
account_id = "5a3ffd86280d3ed086be76d955829242"

[observability]
enabled = true

[observability.logs]
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
FORWARD_ALL_GROUP_MESSAGES = "false"
ENGINE_BASE_URL = "https://api.btservant.ai"
ENGINE_ORG = "unfoldingWord"
ENGINE_TIMEOUT_MS = "45000"
TELEGRAM_TIMEOUT_MS = "15000"
PROGRESS_THROTTLE_SECONDS = "3"
MESSAGE_AGE_CUTOFF_IN_SECONDS = "3600"
LOG_LEVEL = "INFO"
GATEWAY_PUBLIC_URL = "https://bt-servant-telegram-gateway.unfoldingword.workers.dev"

# Secrets (set via `wrangler secret put`):
# TELEGRAM_BOT_TOKEN
# TELEGRAM_BOT_USERNAME
# WEBHOOK_SECRET_TOKEN
# ENGINE_API_KEY

[env.staging]
name = "bt-servant-telegram-gateway-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
FORWARD_ALL_GROUP_MESSAGES = "true"
ENGINE_BASE_URL = "https://staging-api.btservant.ai"
ENGINE_ORG = "unfoldingWord"
ENGINE_TIMEOUT_MS = "45000"
TELEGRAM_TIMEOUT_MS = "15000"
PROGRESS_THROTTLE_SECONDS = "3"
MESSAGE_AGE_CUTOFF_IN_SECONDS = "3600"
LOG_LEVEL = "DEBUG"
GATEWAY_PUBLIC_URL = "https://bt-servant-telegram-gateway-staging.unfoldingword.workers.dev"
